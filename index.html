<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; margin-top: 50px; }
        #countdown { font-size: 50px; }
    </style>
</head>
<body>
    <h1>Easton's Birthday</h1>
    <div id="countdown"></div>

    <script>
        // Set the date we're counting down to
        var countDownDate = new Date('October 19, 2026 00:00:00').getTime();

        // Update the countdown every 1 second
        var x = setInterval(function() {

            // Get today's date and time
            var now = new Date().getTime();

            // Find the distance between now and the count down date
            var distance = countDownDate - now;

            // Time calculations for days, hours, minutes and seconds
            var days = Math.floor(distance / (1000 * 60 * 60 * 24));
            var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            var seconds = Math.floor((distance % (1000 * 60)) / 1000);

            // Output the result in an element with id="countdown"
            document.getElementById('countdown').innerHTML = days + 'd ' + hours + 'h ' + minutes + 'm ' + seconds + 's ';

            // If the countdown is finished, write some text
            if (distance < 0) {
                clearInterval(x);
                document.getElementById('countdown').innerHTML = 'Countdown Finished!';
            }
        }, 1000);
    </script>
    <div style="width: 100%; border-radius: 30px; position:relative" id="pwWidget:b747e5d5-f3d9-4188-85fc-a330668fdc0e">
        <script src="https://widget.perryweather.com/js/PwIframe.min.js"> </script>
        <script>
            PwIframe.createPerryWeatherWidget('b747e5d5-f3d9-4188-85fc-a330668fdc0e');
        </script>
    </div> 
</body>
</html>
